<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            /* Mood & Tone: น้ำเงิน ฟ้า ขาว */
            background: linear-gradient(135deg, #F0F9FF 0%, #BAE6FD 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: rotate(8deg) translateX(4px); }
            20%, 40%, 60%, 80% { transform: rotate(-8deg) translateX(-4px); }
        }

        @keyframes jumpAndFall {
            0% { 
                transform: translateY(0) rotate(0deg); 
                opacity: 0; 
            }
            10% {
                opacity: 1;
            }
            40% { 
                transform: translateY(-80px) rotate(15deg); 
                opacity: 1; 
            }
            100% { 
                transform: translateY(300px) rotate(45deg); 
                opacity: 0; 
            }
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9) translate(-50%, -50%); }
            100% { opacity: 1; transform: scale(1) translate(-50%, -50%); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .shake-active {
            animation: shake 1.5s ease-in-out;
        }

        .stick-falling {
            display: block !important;
            animation: jumpAndFall 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .modal-active {
            animation: fadeInScale 0.4s ease-out forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #E0F2FE; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #7DD3FC; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #38BDF8; 
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center relative">

    <!-- Data & Logic -->
    <script>
        // State
        let isAnimating = false;

        // Inventory State (สต็อกของแจก)
        let itemStock = {
            1: 10, // หน้ากากอนามัย
            2: 9,  // Shopping Bag
            3: 8,  // สมุดโน้ต
            4: 7,  // Gift Set
            5: 6,  // ทิชชูเปียก
            6: 5   // ทิชชูพกพา
        };

        // Prophecy Data (1-6) Items & Insights
        const prophecies = {
            1: {
                item: "หน้ากากอนามัย",
                prophecy: "“วันนี้คุณมีเกณฑ์ต้องเจอคนเยอะ หรืออยู่ในพื้นที่แออัดโดยไม่ทันตั้งตัว”",
                insight: "การอยู่ในที่คนหนาแน่นเพิ่มความเสี่ยงในการรับเชื้อโรคและฝุ่น PM2.5 โดยไม่รู้ตัว โดยเฉพาะช่วงที่ร่างกายอ่อนล้า",
                reason: "หน้ากากคือด่านแรกในการป้องกัน ทั้งฝุ่น แบคทีเรีย และกลิ่นไม่พึงประสงค์",
                summary: "👉 ช่วยให้คุณ “มั่นใจ” และ “ปลอดภัย” ไปพร้อมกัน",
                tips: "ควรเปลี่ยนหน้ากากทุก 4–6 ชั่วโมง เพื่อประสิทธิภาพสูงสุด ช้อปเพิ่มที่บูธได้เลย"
            },
            2: {
                item: "Shopping Bag",
                prophecy: "“วันนี้มีเกณฑ์ได้ของเพิ่มแบบไม่ตั้งใจ หรือมีเรื่องให้ต้องพกพาของมากกว่าปกติ”",
                insight: "การถือของหลายชิ้นโดยไม่สมดุล อาจทำให้เกิดอาการปวดไหล่ ปวดหลัง หรือ Office Syndrome ได้",
                reason: "Shopping Bag ช่วยกระจายน้ำหนัก ลดการเกร็งกล้ามเนื้อ",
                summary: "👉 ทำให้การเคลื่อนไหวของคุณสบายขึ้น",
                tips: "พยายามสะพายสลับข้าง เพื่อลดการกดทับด้านใดด้านหนึ่ง"
            },
            3: {
                item: "สมุดโน้ต",
                prophecy: "“วันนี้เป็นวันที่ไอเดียคุณไหลลื่น มีสิ่งใหม่ ๆ เข้ามาให้คิดและตัดสินใจ”",
                insight: "การจดบันทึกช่วยลดความเครียดจากการพยายามจำหลายเรื่องพร้อมกัน",
                reason: "จำไม่หมด จดลงสมุดดีกว่า",
                summary: "👉 ลดความเครียด และเพิ่มประสิทธิภาพในการทำงาน",
                tips: "ลองเขียน To-do list 3 อย่างหลักของวัน จะช่วยให้โฟกัสดีขึ้น"
            },
            4: {
                item: "Gift Set",
                prophecy: "“วันนี้เหมาะกับการส่งต่อความรู้สึกดี ๆ หรือสร้างความสัมพันธ์กับใครบางคน”",
                insight: "การให้และการสร้างความสัมพันธ์ที่ดี ช่วยลดความเครียด และส่งผลดีต่อสุขภาพจิต",
                reason: "Gift Set คือสื่อกลางของความใส่ใจ",
                summary: "👉 ช่วยให้ทั้ง ‘ผู้ให้’ และ ‘ผู้รับ’ รู้สึกดี",
                tips: "ลองเขียนโน้ตเล็ก ๆ แนบไป จะเพิ่มคุณค่าทางใจมากขึ้น"
            },
            5: {
                item: "ทิชชูเปียก (ขนาดเล็ก)",
                prophecy: "“วันนี้คุณมีเกณฑ์ต้องลุย เดินทาง หรือเจอสถานการณ์ที่ไม่สะดวกสบาย”",
                insight: "การสัมผัสพื้นผิวสาธารณะ เช่น ราวจับ โต๊ะ หรือเงินสด อาจมีเชื้อโรคสะสม",
                reason: "ทิชชูเปียกช่วยทำความสะอาดมือและพื้นผิวได้ทันที",
                summary: "👉 ลดความเสี่ยงในการสะสมเชื้อโรค",
                tips: "ควรเช็ดมือก่อนรับประทานอาหารทุกครั้ง"
            },
            6: {
                item: "ทิชชูพกพา",
                prophecy: "“วันนี้มีเรื่องเล็ก ๆ น้อย ๆ เข้ามาให้คุณต้องจัดการตลอดทั้งวัน”",
                insight: "การรักษาความสะอาดเล็ก ๆ น้อย ๆ เช่น เช็ดเหงื่อ เช็ดสิ่งสกปรก ช่วยลดการสะสมของแบคทีเรีย",
                reason: "ทิชชูแห้งคือไอเทมพื้นฐานที่ใช้ได้ทุกสถานการณ์",
                summary: "👉 ช่วยให้คุณพร้อมรับมือทุกเรื่องจุกจิก",
                tips: "พกติดตัวไว้เสมอ จะช่วยให้จัดการสถานการณ์ไม่คาดคิดได้ง่ายขึ้น"
            }
        };

        // ตรวจสอบเมื่อโหลดหน้าเว็บว่าเคยเล่นไปแล้วหรือยัง
        document.addEventListener('DOMContentLoaded', () => {
            const savedResult = localStorage.getItem('seamsi_result');
            if (savedResult) {
                const instruction = document.getElementById('instruction-text');
                instruction.innerText = '✨ ดูไอเทมของคุณ ✨';
                instruction.classList.remove('animate-bounce'); // เอาเอฟเฟกต์เด้งออกเพราะเล่นไปแล้ว
            }
        });

        // ดึงรายการไอเทมที่ยังมีสต็อกเหลือ
        function getAvailableItems() {
            return Object.keys(itemStock).filter(key => itemStock[key] > 0);
        }

        function shakeCylinder() {
            if(isAnimating) return;

            // ตรวจสอบว่าเคยสุ่มไปแล้วหรือไม่
            const savedResult = localStorage.getItem('seamsi_result');
            if (savedResult) {
                showResultModal(savedResult);
                return;
            }

            // ตรวจสอบว่าของแจกหมดหรือยัง
            const available = getAvailableItems();
            if (available.length === 0) {
                document.getElementById('out-of-stock-modal').classList.remove('hidden');
                return;
            }

            isAnimating = true;

            const cylinder = document.getElementById('cylinder-container');
            const fallingStick = document.getElementById('falling-stick');
            const instruction = document.getElementById('instruction-text');
            
            instruction.style.opacity = '0';
            
            // Start shake animation
            cylinder.classList.add('shake-active');

            // Play animation
            setTimeout(() => {
                cylinder.classList.remove('shake-active');
                
                // สุ่มจากรายการที่ยังมีสต็อกเหลืออยู่เท่านั้น
                const randomIndex = Math.floor(Math.random() * available.length);
                const resultNumber = available[randomIndex];
                
                // หักสต็อก
                itemStock[resultNumber]--;

                document.getElementById('falling-number').innerText = resultNumber;

                // บันทึกผลลัพธ์ลงในเครื่องผู้เล่น
                localStorage.setItem('seamsi_result', resultNumber);

                // Animate stick falling out
                fallingStick.classList.add('stick-falling');

                // Wait for stick to fall, then show modal
                setTimeout(() => {
                    showResultModal(resultNumber);
                    
                    // Reset stick
                    setTimeout(() => {
                        fallingStick.classList.remove('stick-falling');
                        instruction.innerText = '✨ ดูไอเทมของคุณ ✨';
                        instruction.classList.remove('animate-bounce');
                        instruction.style.opacity = '1';
                    }, 500);

                }, 1400); // Trigger modal just before stick animation ends

            }, 1500); // Length of shake animation
        }

        function showResultModal(number) {
            const data = prophecies[number];
            
            // Populate Data
            document.getElementById('res-number').innerText = number;
            document.getElementById('res-item').innerText = data.item;
            document.getElementById('res-prophecy').innerText = data.prophecy;
            document.getElementById('res-insight').innerText = data.insight;
            document.getElementById('res-reason').innerText = data.reason;
            document.getElementById('res-summary').innerText = data.summary;
            document.getElementById('res-tips').innerText = data.tips;

            // Show UI
            document.getElementById('overlay').classList.remove('hidden');
            const modal = document.getElementById('result-modal');
            modal.classList.remove('hidden');
            modal.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('overlay').classList.add('hidden');
            const modal = document.getElementById('result-modal');
            modal.classList.add('hidden');
            modal.classList.remove('modal-active');
            isAnimating = false;
        }

        function closeOutOfStockModal() {
            document.getElementById('out-of-stock-modal').classList.add('hidden');
        }

        // ==========================================
        // Admin / Staff Functions
        // ==========================================

        function resetForNextPlayer() {
            localStorage.removeItem('seamsi_result');
            const instruction = document.getElementById('instruction-text');
            instruction.innerText = '✨ กดเพื่อเขย่าเลย! ✨';
            instruction.classList.add('animate-bounce');
            
            // Visual feedback
            instruction.style.transform = 'translateX(-50%) scale(1.1)';
            setTimeout(() => {
                instruction.style.transform = 'translateX(-50%) scale(1)';
            }, 200);
        }

        function showStock() {
            const stockList = document.getElementById('stock-list');
            stockList.innerHTML = '';
            let total = 0;
            
            for (let i = 1; i <= 6; i++) {
                const amount = itemStock[i];
                total += amount;
                const name = prophecies[i].item;
                const textColorClass = amount === 0 ? 'text-red-500 font-bold' : 'text-blue-700 font-bold';
                
                stockList.innerHTML += `
                    <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                        <span>${i}. ${name}</span> 
                        <span class="${textColorClass}">${amount} ชิ้น</span>
                    </div>`;
            }
            
            stockList.innerHTML += `
                <div class="flex justify-between items-center font-bold pt-2 text-lg text-blue-900">
                    <span>รวมทั้งหมด</span> 
                    <span>${total} ชิ้น</span>
                </div>`;
            
            document.getElementById('stock-modal').classList.remove('hidden');
        }

        function closeStockModal() {
            document.getElementById('stock-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
